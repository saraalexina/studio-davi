<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davi - Artista </title>
    <link rel="stylesheet" href="home.css">
    <!-- Links para fontes personalizadas (Google Fonts, etc.) -->
</head>
<body>
    <header class="main-header">
       <nav class="main-nav">
            <a href="#about" class="nav-item">26/11</a>
            
            <!-- Agrupando para manter a hierarquia visual -->
            <div class="logo-group">
                <h1 class="site-title">DAVI FERREIRA</h1>
                <p class="site-subtitle">Artista</p>
            </div>

            <a href="#contact" class="nav-item">2013</a>
        </nav>
    </header>

    <main class="collage-container">
        <!-- Elementos de colagem aqui -->
        <section class="collage-item item-about">
            <img src="imagens/scott-desenho.png" alt="scott-desenho">
        </section>

        <section class="collage-item item-comic">
            <img src="imagens/varios-desenhos (Personalizado).png" alt="papel com varios desenhos">
        </section>

        <section class="collage-item item-contacts">
            <img src="imagens/shark-desenho.png" alt="shark-desenho">
        </section>

        <section class="collage-item item-commission-info">
            <img src="imagens/star-desenho.png" alt="star-desenho">
        </section>

        <section class="collage-item item-portfolio">
            <img src="imagens/trash-desenho.png" alt="trash-desenho">
        </section>
        <section class="collage-item item-caderno">
            <img src="imagens/caderno de desenhos.png" alt="caderno-desenho">
        </section>

        <!-- A grande ilustração da artista pode ser um elemento de fundo ou uma imagem posicionada absolutamente -->
        <img src="imagens/davi 657x920 (1).png" alt="Artist Illustration" class="artist-illustration left">
        <img src="imagens/davi 657x920 (2).png" alt="Artist Illustration" class="artist-illustration right">

    </main>

    <script src="home.js"></script>
</body>
</html>
